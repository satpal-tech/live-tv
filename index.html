
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akoi Live TV</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }
        .live-badge { position: absolute; top: 20px; left: 20px; background: red; color: white; padding: 5px 12px; font-weight: bold; border-radius: 4px; z-index: 10; }
        .news-ticker { position: absolute; bottom: 0; width: 100%; background: blue; color: white; padding: 8px 0; font-size: 18px; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-badge">● LIVE</div>
    
    <video id="tvVideo" autoplay loop muted playsinline>
        <source src="https://raw.githubusercontent.com/satpal-tech/live-tv/main/akoi.mp4" type="video/mp4">
        ਤੁਹਾਡਾ ਬ੍ਰਾਊਜ਼ਰ ਵੀਡੀਓ ਸਪੋਰਟ ਨਹੀਂ ਕਰਦਾ।
    </video>

    <div class="news-ticker">
        <marquee>ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ ਜੀ, ਤੁਸੀਂ ਦੇਖ ਰਹੇ ਹੋ Akoi Live TV... ਪੇਂਡੂ ਨਿਊਜ਼ ਮਲੇਰਕੋਟਲਾ...</marquee>
    </div>
</div>

<script>
    var vid = document.getElementById("tvVideo");
    // ਸਕ੍ਰੀਨ 'ਤੇ ਕਿਤੇ ਵੀ ਕਲਿੱਕ ਕਰਨ ਨਾਲ ਆਵਾਜ਼ ਚਾਲੂ ਹੋ ਜਾਵੇਗੀ
    document.body.onclick = function() {
        vid.muted = false;
        vid.play();
    };
</script>

</body>
</html>
