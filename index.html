<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akoi Live TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        .vjs-default-skin { width: 100vw; height: 100vh; }
        .live-badge { position: absolute; top: 20px; left: 20px; background: red; color: white; padding: 5px 12px; font-weight: bold; border-radius: 4px; z-index: 10; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .news-ticker { position: absolute; bottom: 0; width: 100%; background: blue; color: white; padding: 10px 0; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>

    <div class="live-badge">● LIVE</div>

    <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" 
           controls preload="auto" autoplay muted loop playsinline>
        <source src="https://raw.githubusercontent.com/satpal-tech/live-tv/main/akoi.mp4" type="video/mp4">
    </video>

    <div class="news-ticker">
        <marquee scrollamount="8">ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ ਜੀ, ਤੁਸੀਂ ਦੇਖ ਰਹੇ ਹੋ Akoi Live TV... ਪੇਂਡੂ ਨਿਊਜ਼ ਮਲੇਰਕੋਟਲਾ... ਸਾਡੇ ਚੈਨਲ ਨੂੰ ਦੇਖਣ ਲਈ ਧੰਨਵਾਦ।</marquee>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        player.ready(function() {
            this.play();
        });
        // ਸਕ੍ਰੀਨ 'ਤੇ ਕਲਿੱਕ ਕਰਨ ਨਾਲ ਆਵਾਜ਼ ਚੱਲੇਗੀ
        document.body.onclick = function() {
            player.muted(false);
            player.play();
        };
    </script>
</body>
</html>
