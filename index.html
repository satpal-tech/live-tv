<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akoi Live TV</title>
    <style>
        body { margin: 0; background-color: black; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <video id="myVideo" autoplay muted loop playsinline>
        <source src="akoi.mp4" type="video/mp4">
        ਤੁਹਾਡਾ ਬ੍ਰਾਊਜ਼ਰ ਇਸ ਵੀਡੀਓ ਨੂੰ ਸਪੋਰਟ ਨਹੀਂ ਕਰਦਾ।
    </video>

    <script>
        // ਇਹ ਸਕ੍ਰਿਪਟ ਪੱਕਾ ਕਰੇਗੀ ਕਿ ਵੀਡੀਓ ਆਪਣੇ ਆਪ ਚੱਲਦੀ ਰਹੇ
        var video = document.getElementById("myVideo");
        video.play().catch(function(error) {
            console.log("Auto-play blocked, waiting for user interaction.");
        });
    </script>

</body>
</html>
