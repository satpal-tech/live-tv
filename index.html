<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akoi Live TV</title>
    <style>
        body { margin: 0; background: black; font-family: Arial, sans-serif; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Live Badge */
        .live-badge {
            position: absolute; top: 20px; left: 20px;
            background: red; color: white; padding: 5px 15px;
            font-weight: bold; border-radius: 5px; font-size: 18px;
            animation: blink 1s infinite; z-index: 10;
        }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        /* News Ticker */
        .news-ticker {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 255, 0.8); color: white;
            padding: 10px 0; font-size: 20px; white-space: nowrap;
            overflow: hidden; z-index: 10;
        }
        .news-ticker marquee { width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-badge">● LIVE</div>
    
    <video id="tvVideo" preload="auto" loop playsinline muted>
        <source src="akoi.mp4" type="video/mp4">
        ਤੁਹਾਡਾ ਬ੍ਰਾਊਜ਼ਰ ਵੀਡੀਓ ਸਪੋਰਟ ਨਹੀਂ ਕਰਦਾ।
    </video>

    <div class="news-ticker">
        <marquee>ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ ਜੀ, ਤੁਸੀਂ ਦੇਖ ਰਹੇ ਹੋ Akoi Live TV... ਪੇਂਡੂ ਨਿਊਜ਼ ਅਤੇ ਮਨੋਰੰਜਨ ਲਈ ਸਾਡੇ ਨਾਲ ਜੁੜੇ ਰਹੋ...</marquee>
    </div>
</div>

<script>
    var vid = document.getElementById("tvVideo");
    
    // ਵੀਡੀਓ ਨੂੰ ਜ਼ਬਰਦਸਤੀ ਚਲਾਉਣ ਲਈ
    window.onload = function() {
        vid.play();
    };

    // ਸਕ੍ਰੀਨ 'ਤੇ ਕਿਤੇ ਵੀ ਕਲਿੱਕ ਕਰਨ ਨਾਲ ਆਵਾਜ਼ ਚੱਲ ਪਵੇਗੀ
    document.body.onclick = function() {
        vid.muted = false;
        vid.play();
    };
</script>

</body>
</html>
